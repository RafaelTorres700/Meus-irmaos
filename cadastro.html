<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - QSESMI</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="img/LOGOMARCAREGISTRADA.jpg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .cadastro-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: var(--background-color);
      }

      .cadastro-container {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 560px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .cadastro-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
      }

      .cadastro-logo img {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        margin-bottom: 0.8rem;
        border: 2px solid var(--primary-color);
      }

      .cadastro-logo h1 {
        font-size: 1.4rem;
        color: var(--primary-color);
        text-align: center;
        font-weight: 700;
      }

      .cadastro-logo p {
        color: var(--text-secondary-color);
        font-size: 0.9rem;
        text-align: center;
      }

      .cadastro-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .form-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-color);
      }

      .form-group input {
        background: var(--surface-color-secondary, #2a2a2a);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        color: var(--text-color);
        font-size: 0.95rem;
        font-family: inherit;
        transition: border-color 0.3s ease;
        width: 100%;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(191, 174, 142, 0.15);
      }

      .form-group input::placeholder {
        color: var(--text-tertiary-color, #666);
      }

      .cep-group {
        position: relative;
      }

      .cep-group input {
        padding-right: 3rem;
      }

      .btn-buscar-cep {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--primary-color);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0.2rem;
        transition: transform 0.2s;
      }

      .btn-buscar-cep:hover {
        transform: translateY(-50%) scale(1.2);
      }

      .btn-buscar-cep.loading i {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .section-title {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--primary-color);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 0.5rem;
        padding-bottom: 0.3rem;
        border-bottom: 1px solid var(--border-color);
      }

      .mensagem {
        display: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        font-weight: 500;
      }

      .btn-cadastrar {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color, #a89060)
        );
        color: var(--accent-color, #1a1a1a);
        border: none;
        border-radius: 50px;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 0.5rem;
        font-family: inherit;
      }

      .btn-cadastrar:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(191, 174, 142, 0.4);
      }

      .btn-cadastrar:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .cadastro-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary-color);
        font-size: 0.9rem;
      }

      .cadastro-footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
      }

      .cadastro-footer a:hover {
        text-decoration: underline;
      }

      .senha-info {
        font-size: 0.75rem;
        color: var(--text-tertiary-color, #666);
        margin-top: 0.2rem;
      }

      @media (max-width: 500px) {
        .form-row {
          grid-template-columns: 1fr;
        }
        .cadastro-container {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="cadastro-wrapper">
      <div class="cadastro-container">
        <!-- Logo -->
        <div class="cadastro-logo">
          <img src="img/LOGOMARCAREGISTRADA.jpg" alt="Logo QSESMI" />
          <h1>Criar sua conta</h1>
          <p>Cadastre-se para comprar em nossa loja</p>
        </div>

        <!-- Mensagem feedback -->
        <div class="mensagem" id="mensagem"></div>

        <form class="cadastro-form" id="cadastroForm">
          <!-- Dados Pessoais -->
          <p class="section-title">
            <i class="fas fa-user"></i> Dados Pessoais
          </p>

          <div class="form-group">
            <label for="nome_completo">Nome completo *</label>
            <input
              type="text"
              id="nome_completo"
              placeholder="Seu nome completo"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">E-mail *</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="senha">Senha *</label>
              <input
                type="password"
                id="senha"
                placeholder="Mínimo 6 caracteres"
                required
                minlength="6"
              />
              <span class="senha-info">Mínimo 6 caracteres</span>
            </div>
            <div class="form-group">
              <label for="confirmar_senha">Confirmar senha *</label>
              <input
                type="password"
                id="confirmar_senha"
                placeholder="Repita a senha"
                required
              />
            </div>
          </div>

          <!-- Endereço -->
          <p class="section-title">
            <i class="fas fa-map-marker-alt"></i> Endereço de Entrega
          </p>

          <div class="form-group">
            <label for="cep">CEP *</label>
            <div class="cep-group">
              <input
                type="text"
                id="cep"
                placeholder="00000-000"
                maxlength="9"
                required
              />
              <button
                type="button"
                class="btn-buscar-cep"
                id="btnCep"
                title="Buscar CEP"
              >
                <i class="fas fa-search"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="rua">Rua / Logradouro *</label>
            <input type="text" id="rua" placeholder="Nome da rua" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="numero">Número *</label>
              <input type="text" id="numero" placeholder="Nº" required />
            </div>
            <div class="form-group">
              <label for="complemento">Complemento</label>
              <input
                type="text"
                id="complemento"
                placeholder="Apto, Bloco..."
              />
            </div>
          </div>

          <div class="form-group">
            <label for="bairro">Bairro *</label>
            <input type="text" id="bairro" placeholder="Seu bairro" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cidade">Cidade *</label>
              <input
                type="text"
                id="cidade"
                placeholder="Sua cidade"
                required
              />
            </div>
            <div class="form-group">
              <label for="estado">Estado *</label>
              <input
                type="text"
                id="estado"
                placeholder="UF"
                maxlength="2"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-cadastrar" id="btnCadastrar">
            <i class="fas fa-user-plus"></i> Criar Conta
          </button>
        </form>

        <div class="cadastro-footer">
          Já tem conta? <a href="login.html">Faça login aqui</a>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL =
        window.location.hostname === "localhost"
          ? "http://localhost:3001"
          : "https://qsesmi-pagamentos-api.onrender.com";

      // Formatar CEP automaticamente
      document.getElementById("cep").addEventListener("input", function () {
        let v = this.value.replace(/\D/g, "");
        if (v.length > 5) v = v.slice(0, 5) + "-" + v.slice(5, 8);
        this.value = v;
      });

      // Buscar CEP pela API ViaCEP
      async function buscarCep() {
        const cep = document.getElementById("cep").value.replace(/\D/g, "");
        const btn = document.getElementById("btnCep");

        if (cep.length !== 8) {
          alert("Digite um CEP válido com 8 dígitos.");
          return;
        }

        btn.classList.add("loading");
        btn.innerHTML = '<i class="fas fa-spinner"></i>';

        try {
          const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
          const data = await res.json();

          if (data.erro) {
            alert("CEP não encontrado. Verifique e tente novamente.");
          } else {
            document.getElementById("rua").value = data.logradouro || "";
            document.getElementById("bairro").value = data.bairro || "";
            document.getElementById("cidade").value = data.localidade || "";
            document.getElementById("estado").value = data.uf || "";
            document.getElementById("numero").focus();
          }
        } catch (err) {
          alert("Erro ao buscar CEP. Verifique sua conexão.");
        } finally {
          btn.classList.remove("loading");
          btn.innerHTML = '<i class="fas fa-search"></i>';
        }
      }

      document.getElementById("btnCep").addEventListener("click", buscarCep);

      // Buscar CEP ao pressionar Enter no campo
      document.getElementById("cep").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          buscarCep();
        }
      });

      // Submeter cadastro
      document
        .getElementById("cadastroForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const mensagem = document.getElementById("mensagem");
          const btn = document.getElementById("btnCadastrar");

          const senha = document.getElementById("senha").value;
          const confirmar = document.getElementById("confirmar_senha").value;

          // Validar senhas
          if (senha !== confirmar) {
            mensagem.style.display = "block";
            mensagem.style.background = "#f8d7da";
            mensagem.style.color = "#721c24";
            mensagem.textContent = "As senhas não coincidem!";
            return;
          }

          if (senha.length < 6) {
            mensagem.style.display = "block";
            mensagem.style.background = "#f8d7da";
            mensagem.style.color = "#721c24";
            mensagem.textContent = "A senha deve ter no mínimo 6 caracteres.";
            return;
          }

          btn.disabled = true;
          btn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';

          const payload = {
            nome_completo: document
              .getElementById("nome_completo")
              .value.trim(),
            email: document.getElementById("email").value.trim(),
            senha: senha,
            cep: document.getElementById("cep").value.trim(),
            rua: document.getElementById("rua").value.trim(),
            numero: document.getElementById("numero").value.trim(),
            complemento: document.getElementById("complemento").value.trim(),
            bairro: document.getElementById("bairro").value.trim(),
            cidade: document.getElementById("cidade").value.trim(),
            estado: document
              .getElementById("estado")
              .value.trim()
              .toUpperCase(),
          };

          try {
            const response = await fetch(`${BACKEND_URL}/auth/cadastro`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (response.ok) {
              mensagem.style.display = "block";
              mensagem.style.background = "#d4edda";
              mensagem.style.color = "#155724";
              mensagem.innerHTML = `
              <i class="fas fa-check-circle"></i>
              <strong>Cadastro realizado com sucesso!</strong><br>
              Verifique seu e-mail <strong>${payload.email}</strong> para confirmar sua conta antes de fazer login.
            `;
              document.getElementById("cadastroForm").reset();

              setTimeout(() => {
                window.location.href = "login.html";
              }, 4000);
            } else {
              mensagem.style.display = "block";
              mensagem.style.background = "#f8d7da";
              mensagem.style.color = "#721c24";
              mensagem.textContent = data.error || "Erro ao realizar cadastro";
              btn.disabled = false;
              btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
            }
          } catch (error) {
            mensagem.style.display = "block";
            mensagem.style.background = "#f8d7da";
            mensagem.style.color = "#721c24";
            mensagem.textContent = "Erro ao conectar com o servidor";
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
          }
        });
    </script>
  </body>
</html>
