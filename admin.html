<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - QSESMI</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="img/LOGOMARCAREGISTRADA.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body { font-family: 'Inter', sans-serif; background: var(--background-color); color: var(--text-color); }

      /* LOGIN ADMIN */
      .admin-login-wrapper {
        min-height: 100vh; display: flex; align-items: center;
        justify-content: center; background: var(--background-color);
      }
      .admin-login-box {
        background: var(--surface-color); border: 1px solid var(--border-color);
        border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
        text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }
      .admin-login-box img { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 1rem; border: 2px solid var(--primary-color); }
      .admin-login-box h1 { color: var(--primary-color); font-size: 1.4rem; margin-bottom: 0.4rem; }
      .admin-login-box p { color: var(--text-secondary-color); font-size: 0.9rem; margin-bottom: 1.5rem; }
      .admin-login-box input[type="password"] {
        width: 100%; padding: 0.8rem 1rem; background: var(--surface-color-secondary, #2a2a2a);
        border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);
        font-size: 1rem; font-family: inherit; margin-bottom: 1rem;
      }
      .admin-login-box input[type="password"]:focus { outline: none; border-color: var(--primary-color); }
      .btn-admin-entrar {
        width: 100%; padding: 0.9rem; background: linear-gradient(135deg, var(--primary-color), #a89060);
        color: #1a1a1a; border: none; border-radius: 50px; font-size: 1rem;
        font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.3s;
      }
      .btn-admin-entrar:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(191,174,142,0.4); }

      /* PAINEL ADMIN */
      #painel { display: none; }

      .admin-header {
        background: var(--surface-color); border-bottom: 2px solid var(--primary-color);
        padding: 1rem 2rem; display: flex; align-items: center;
        justify-content: space-between; position: sticky; top: 0; z-index: 100;
      }
      .admin-header-left { display: flex; align-items: center; gap: 1rem; }
      .admin-header-left img { width: 40px; height: 40px; border-radius: 50%; }
      .admin-header-left h1 { color: var(--primary-color); font-size: 1.2rem; }
      .btn-logout {
        background: transparent; border: 1px solid var(--primary-color);
        color: var(--primary-color); padding: 0.5rem 1rem; border-radius: 20px;
        cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: all 0.3s;
      }
      .btn-logout:hover { background: var(--primary-color); color: #1a1a1a; }

      .admin-tabs {
        display: flex; gap: 0; background: var(--surface-color);
        border-bottom: 1px solid var(--border-color); padding: 0 2rem;
      }
      .tab-btn {
        padding: 1rem 1.5rem; background: none; border: none; border-bottom: 3px solid transparent;
        color: var(--text-secondary-color); cursor: pointer; font-size: 0.95rem;
        font-family: inherit; font-weight: 500; transition: all 0.3s;
      }
      .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
      .tab-btn:hover { color: var(--primary-color); }

      .admin-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }

      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* CARDS DE STATS */
      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; margin-bottom: 2rem; }
      .stat-card {
        background: var(--surface-color); border: 1px solid var(--border-color);
        border-radius: 12px; padding: 1.5rem; text-align: center;
      }
      .stat-card .stat-icon { font-size: 2rem; color: var(--primary-color); margin-bottom: 0.5rem; }
      .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary-color); }
      .stat-card .stat-label { font-size: 0.8rem; color: var(--text-secondary-color); text-transform: uppercase; letter-spacing: 1px; }

      /* FORMULÁRIO PRODUTO */
      .form-card {
        background: var(--surface-color); border: 1px solid var(--border-color);
        border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;
      }
      .form-card h3 { color: var(--primary-color); margin-bottom: 1.2rem; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .form-full { grid-column: 1 / -1; }
      .form-field { display: flex; flex-direction: column; gap: 0.4rem; }
      .form-field label { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary-color); text-transform: uppercase; letter-spacing: 0.5px; }
      .form-field input, .form-field textarea, .form-field select {
        background: var(--surface-color-secondary, #2a2a2a); border: 1px solid var(--border-color);
        border-radius: 8px; padding: 0.7rem 1rem; color: var(--text-color);
        font-size: 0.9rem; font-family: inherit; transition: border-color 0.3s;
      }
      .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--primary-color); }
      .form-field textarea { resize: vertical; min-height: 80px; }
      .form-actions { display: flex; gap: 1rem; margin-top: 1rem; }
      .btn-primary {
        padding: 0.75rem 1.5rem; background: linear-gradient(135deg, var(--primary-color), #a89060);
        color: #1a1a1a; border: none; border-radius: 50px; font-size: 0.9rem;
        font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.3s; display: flex; align-items: center; gap: 0.4rem;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(191,174,142,0.4); }
      .btn-secondary {
        padding: 0.75rem 1.5rem; background: transparent; border: 1px solid var(--border-color);
        color: var(--text-color); border-radius: 50px; font-size: 0.9rem;
        cursor: pointer; font-family: inherit; transition: all 0.3s;
      }
      .btn-secondary:hover { border-color: var(--primary-color); color: var(--primary-color); }

      /* TABELA PRODUTOS */
      .table-card {
        background: var(--surface-color); border: 1px solid var(--border-color);
        border-radius: 12px; overflow: hidden;
      }
      .table-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
      .table-header h3 { color: var(--primary-color); font-size: 1rem; }
      table { width: 100%; border-collapse: collapse; }
      th { background: var(--surface-color-secondary, #2a2a2a); padding: 0.8rem 1rem; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary-color); }
      td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; vertical-align: middle; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: rgba(191,174,142,0.05); }

      .produto-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }
      .badge { padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
      .badge-ativo { background: rgba(37,211,102,0.15); color: #25d366; }
      .badge-inativo { background: rgba(255,107,107,0.15); color: #ff6b6b; }
      .badge-estoque-ok { background: rgba(37,211,102,0.15); color: #25d366; }
      .badge-estoque-baixo { background: rgba(255,193,7,0.15); color: #ffc107; }
      .badge-estoque-zero { background: rgba(255,107,107,0.15); color: #ff6b6b; }

      .btn-icon {
        padding: 0.4rem 0.7rem; border: 1px solid var(--border-color); background: transparent;
        border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; margin-right: 0.3rem;
      }
      .btn-icon:hover { transform: scale(1.1); }
      .btn-edit:hover { border-color: var(--primary-color); color: var(--primary-color); }
      .btn-delete:hover { border-color: #ff6b6b; color: #ff6b6b; }
      .btn-toggle:hover { border-color: #25d366; color: #25d366; }

      /* MENSAGEM */
      .msg { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
      .msg-success { background: rgba(37,211,102,0.15); color: #25d366; border: 1px solid rgba(37,211,102,0.3); }
      .msg-error { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }

      /* PEDIDOS */
      .status-approved { color: #25d366; font-weight: 600; }
      .status-pending { color: #ffc107; font-weight: 600; }
      .status-rejected { color: #ff6b6b; font-weight: 600; }

      /* LOADING */
      .loading-text { text-align: center; color: var(--text-secondary-color); padding: 2rem; }

      @media (max-width: 768px) {
        .form-grid { grid-template-columns: 1fr; }
        .admin-content { padding: 1rem; }
        .admin-tabs { padding: 0; overflow-x: auto; }
        .tab-btn { padding: 0.8rem 1rem; font-size: 0.85rem; white-space: nowrap; }
        table { font-size: 0.8rem; }
        td, th { padding: 0.6rem 0.5rem; }
      }
    </style>
  </head>
  <body>

    <!-- ===== TELA DE LOGIN ADMIN ===== -->
    <div id="login-admin" class="admin-login-wrapper">
      <div class="admin-login-box">
        <img src="img/LOGOMARCAREGISTRADA.jpg" alt="Logo" />
        <h1>Painel Administrativo</h1>
        <p>Digite a chave de acesso para entrar</p>
        <div class="msg msg-error" id="msg-login"></div>
        <input type="password" id="admin-key-input" placeholder="Chave de acesso..." />
        <button class="btn-admin-entrar" id="btn-admin-entrar">
          <i class="fas fa-lock"></i> Entrar
        </button>
      </div>
    </div>

    <!-- ===== PAINEL ADMIN ===== -->
    <div id="painel">

      <!-- Header -->
      <div class="admin-header">
        <div class="admin-header-left">
          <img src="img/LOGOMARCAREGISTRADA.jpg" alt="Logo" />
          <h1>QSESMI — Admin</h1>
        </div>
        <button class="btn-logout" onclick="sairAdmin()">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="mostrarTab('produtos')">
          <i class="fas fa-box"></i> Produtos
        </button>
        <button class="tab-btn" onclick="mostrarTab('pedidos')">
          <i class="fas fa-receipt"></i> Pedidos
        </button>
      </div>

      <div class="admin-content">

        <!-- ===== TAB: PRODUTOS ===== -->
        <div class="tab-panel active" id="tab-produtos">

          <!-- Stats -->
          <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-box"></i></div>
              <div class="stat-num" id="stat-total">-</div>
              <div class="stat-label">Total Produtos</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
              <div class="stat-num" id="stat-ativos">-</div>
              <div class="stat-label">Ativos</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
              <div class="stat-num" id="stat-sem-estoque">-</div>
              <div class="stat-label">Sem Estoque</div>
            </div>
          </div>

          <!-- Mensagem feedback produtos -->
          <div class="msg" id="msg-produto"></div>

          <!-- Formulário adicionar/editar -->
          <div class="form-card">
            <h3><i class="fas fa-plus-circle"></i> <span id="form-titulo">Adicionar Produto</span></h3>
            <input type="hidden" id="produto-id" />
            <div class="form-grid">
              <div class="form-field form-full">
                <label>Nome do Produto *</label>
                <input type="text" id="p-nome" placeholder="Ex: Camiseta Desafio 2025" />
              </div>
              <div class="form-field form-full">
                <label>Descrição</label>
                <textarea id="p-descricao" placeholder="Descreva o produto..."></textarea>
              </div>
              <div class="form-field">
                <label>Preço (R$) *</label>
                <input type="number" id="p-preco" placeholder="0.00" min="0" step="0.01" />
              </div>
              <div class="form-field">
                <label>Quantidade em Estoque</label>
                <input type="number" id="p-estoque" placeholder="0" min="0" />
              </div>
              <div class="form-field form-full">
                <label>URL da Imagem</label>
                <input type="text" id="p-imagem" placeholder="https://... ou img/nome.jpg" />
              </div>
            </div>
            <div class="form-actions">
              <button class="btn-primary" onclick="salvarProduto()">
                <i class="fas fa-save"></i> Salvar Produto
              </button>
              <button class="btn-secondary" onclick="limparFormulario()">
                <i class="fas fa-times"></i> Cancelar
              </button>
            </div>
          </div>

          <!-- Tabela de produtos -->
          <div class="table-card">
            <div class="table-header">
              <h3><i class="fas fa-list"></i> Produtos Cadastrados</h3>
              <button class="btn-primary" onclick="carregarProdutos()" style="padding:0.5rem 1rem;font-size:0.8rem;">
                <i class="fas fa-sync"></i> Atualizar
              </button>
            </div>
            <div id="tabela-produtos">
              <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Carregando...</p>
            </div>
          </div>
        </div>

        <!-- ===== TAB: PEDIDOS ===== -->
        <div class="tab-panel" id="tab-pedidos">
          <div class="table-card">
            <div class="table-header">
              <h3><i class="fas fa-receipt"></i> Pedidos Realizados</h3>
              <button class="btn-primary" onclick="carregarPedidos()" style="padding:0.5rem 1rem;font-size:0.8rem;">
                <i class="fas fa-sync"></i> Atualizar
              </button>
            </div>
            <div id="tabela-pedidos">
              <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Carregando...</p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      const BACKEND_URL = window.location.hostname === 'localhost'
        ? 'http://localhost:3001'
        : 'https://qsesmi-pagamentos-api.onrender.com';

      let ADMIN_KEY = '';

      // ===== LOGIN ADMIN =====
      document.getElementById('admin-key-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') entrarAdmin();
      });

      document.getElementById('btn-admin-entrar').addEventListener('click', entrarAdmin);

      async function entrarAdmin() {
        const key = document.getElementById('admin-key-input').value.trim();
        const msgEl = document.getElementById('msg-login');

        if (!key) {
          mostrarMsg(msgEl, 'Digite a chave de acesso.', 'error');
          return;
        }

        // Testar a chave fazendo uma chamada real ao backend
        try {
          const res = await fetch(`${BACKEND_URL}/admin/produtos`, {
            headers: { 'x-admin-key': key }
          });

          if (res.ok) {
            ADMIN_KEY = key;
            document.getElementById('login-admin').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
            carregarProdutos();
          } else {
            mostrarMsg(msgEl, 'Chave inválida! Verifique e tente novamente.', 'error');
          }
        } catch (err) {
          mostrarMsg(msgEl, 'Erro ao conectar com o servidor.', 'error');
        }
      }

      function sairAdmin() {
        ADMIN_KEY = '';
        document.getElementById('painel').style.display = 'none';
        document.getElementById('login-admin').style.display = 'flex';
        document.getElementById('admin-key-input').value = '';
      }

      // ===== TABS =====
      function mostrarTab(tab) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        event.target.closest('.tab-btn').classList.add('active');

        if (tab === 'pedidos') carregarPedidos();
      }

      // ===== PRODUTOS =====
      async function carregarProdutos() {
        const container = document.getElementById('tabela-produtos');
        container.innerHTML = '<p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Carregando...</p>';

        try {
          const res = await fetch(`${BACKEND_URL}/admin/produtos`, {
            headers: { 'x-admin-key': ADMIN_KEY }
          });
          const produtos = await res.json();

          // Atualizar stats
          document.getElementById('stat-total').textContent = produtos.length;
          document.getElementById('stat-ativos').textContent = produtos.filter(p => p.ativo).length;
          document.getElementById('stat-sem-estoque').textContent = produtos.filter(p => p.quantidade_estoque === 0).length;

          if (produtos.length === 0) {
            container.innerHTML = '<p class="loading-text">Nenhum produto cadastrado ainda.</p>';
            return;
          }

          container.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>Imagem</th>
                  <th>Nome</th>
                  <th>Preço</th>
                  <th>Estoque</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                ${produtos.map(p => `
                  <tr>
                    <td>
                      ${p.imagem_url
                        ? `<img src="${p.imagem_url}" class="produto-img-preview" onerror="this.style.display='none'" />`
                        : '<i class="fas fa-image" style="font-size:2rem;color:#666;"></i>'
                      }
                    </td>
                    <td>
                      <strong>${p.nome}</strong><br>
                      <small style="color:var(--text-secondary-color)">${p.descricao ? p.descricao.slice(0,60) + '...' : ''}</small>
                    </td>
                    <td><strong>R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</strong></td>
                    <td>
                      <span class="badge ${p.quantidade_estoque > 5 ? 'badge-estoque-ok' : p.quantidade_estoque > 0 ? 'badge-estoque-baixo' : 'badge-estoque-zero'}">
                        ${p.quantidade_estoque} un.
                      </span>
                    </td>
                    <td>
                      <span class="badge ${p.ativo ? 'badge-ativo' : 'badge-inativo'}">
                        ${p.ativo ? 'Ativo' : 'Inativo'}
                      </span>
                    </td>
                    <td>
                      <button class="btn-icon btn-edit" onclick="editarProduto(${JSON.stringify(p).replace(/"/g, '&quot;')})" title="Editar">
                        <i class="fas fa-edit"></i>
                      </button>
                      <button class="btn-icon btn-toggle" onclick="toggleProduto(${p.id}, ${p.ativo})" title="${p.ativo ? 'Desativar' : 'Ativar'}">
                        <i class="fas fa-${p.ativo ? 'eye-slash' : 'eye'}"></i>
                      </button>
                      <button class="btn-icon btn-delete" onclick="excluirProduto(${p.id}, '${p.nome}')" title="Excluir">
                        <i class="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } catch (err) {
          container.innerHTML = '<p class="loading-text" style="color:#ff6b6b;">Erro ao carregar produtos.</p>';
        }
      }

      async function salvarProduto() {
        const id = document.getElementById('produto-id').value;
        const nome = document.getElementById('p-nome').value.trim();
        const preco = document.getElementById('p-preco').value;
        const msgEl = document.getElementById('msg-produto');

        if (!nome || !preco) {
          mostrarMsg(msgEl, 'Nome e preço são obrigatórios!', 'error');
          return;
        }

        const payload = {
          nome,
          descricao: document.getElementById('p-descricao').value.trim(),
          preco: parseFloat(preco),
          quantidade_estoque: parseInt(document.getElementById('p-estoque').value) || 0,
          imagem_url: document.getElementById('p-imagem').value.trim(),
          ativo: true
        };

        try {
          const url = id ? `${BACKEND_URL}/admin/produtos/${id}` : `${BACKEND_URL}/admin/produtos`;
          const method = id ? 'PUT' : 'POST';

          const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
            body: JSON.stringify(payload)
          });

          const data = await res.json();

          if (res.ok) {
            mostrarMsg(msgEl, `Produto ${id ? 'atualizado' : 'criado'} com sucesso!`, 'success');
            limparFormulario();
            carregarProdutos();
          } else {
            mostrarMsg(msgEl, data.error || 'Erro ao salvar produto.', 'error');
          }
        } catch (err) {
          mostrarMsg(msgEl, 'Erro ao conectar com o servidor.', 'error');
        }
      }

      function editarProduto(p) {
        document.getElementById('produto-id').value = p.id;
        document.getElementById('p-nome').value = p.nome;
        document.getElementById('p-descricao').value = p.descricao || '';
        document.getElementById('p-preco').value = p.preco;
        document.getElementById('p-estoque').value = p.quantidade_estoque;
        document.getElementById('p-imagem').value = p.imagem_url || '';
        document.getElementById('form-titulo').textContent = 'Editar Produto';
        document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
      }

      function limparFormulario() {
        document.getElementById('produto-id').value = '';
        document.getElementById('p-nome').value = '';
        document.getElementById('p-descricao').value = '';
        document.getElementById('p-preco').value = '';
        document.getElementById('p-estoque').value = '';
        document.getElementById('p-imagem').value = '';
        document.getElementById('form-titulo').textContent = 'Adicionar Produto';
      }

      async function toggleProduto(id, ativo) {
        const acao = ativo ? 'desativar' : 'ativar';
        if (!confirm(`Deseja ${acao} este produto?`)) return;

        try {
          const res = await fetch(`${BACKEND_URL}/admin/produtos/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
            body: JSON.stringify({ ativo: !ativo })
          });
          if (res.ok) carregarProdutos();
        } catch (err) {
          alert('Erro ao atualizar produto.');
        }
      }

      async function excluirProduto(id, nome) {
        if (!confirm(`Tem certeza que deseja DESATIVAR o produto "${nome}"?`)) return;

        try {
          const res = await fetch(`${BACKEND_URL}/admin/produtos/${id}`, {
            method: 'DELETE',
            headers: { 'x-admin-key': ADMIN_KEY }
          });
          if (res.ok) {
            carregarProdutos();
          }
        } catch (err) {
          alert('Erro ao excluir produto.');
        }
      }

      // ===== PEDIDOS =====
      async function carregarPedidos() {
        const container = document.getElementById('tabela-pedidos');
        container.innerHTML = '<p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Carregando...</p>';

        try {
          const res = await fetch(`${BACKEND_URL}/admin/pedidos`, {
            headers: { 'x-admin-key': ADMIN_KEY }
          });
          const pedidos = await res.json();

          if (!pedidos.length) {
            container.innerHTML = '<p class="loading-text">Nenhum pedido encontrado.</p>';
            return;
          }

          container.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>Nº Pedido</th>
                  <th>Produto</th>
                  <th>Total</th>
                  <th>Método</th>
                  <th>Status</th>
                  <th>Comprador</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody>
                ${pedidos.map(p => `
                  <tr>
                    <td><strong>#${p.order_number || p.id}</strong></td>
                    <td>${p.product_title || '-'}</td>
                    <td><strong>R$ ${parseFloat(p.total_amount || 0).toFixed(2).replace('.',',')}</strong></td>
                    <td>${p.payment_method || '-'}</td>
                    <td><span class="status-${p.payment_status || 'pending'}">${p.payment_status || 'pendente'}</span></td>
                    <td>${p.buyer_name || p.buyer_email || '-'}</td>
                    <td>${p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR') : '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } catch (err) {
          container.innerHTML = '<p class="loading-text" style="color:#ff6b6b;">Erro ao carregar pedidos.</p>';
        }
      }

      // ===== UTILS =====
      function mostrarMsg(el, texto, tipo) {
        el.style.display = 'block';
        el.className = `msg msg-${tipo}`;
        el.innerHTML = `<i class="fas fa-${tipo === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${texto}`;
        setTimeout(() => { el.style.display = 'none'; }, 4000);
      }
    </script>
  </body>
</html>
